{% load i18n %}<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Login" %} — Bibaj Menaxhment</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <script src="{% static 'js/theme.js' %}"></script>
</head>
<body>
    <div class="login-page">
        <div class="login-card card">
            <div class="login-card__header">
                <h1>Bibaj Menaxhment</h1>
                <p>{% trans "Sign in to your account" %}</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">{% trans "Username" %}</label>
                    <input type="text" name="username" id="username" class="form-control" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">{% trans "Password" %}</label>
                    <input type="password" name="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn--primary w-full">{% trans "Sign In" %}</button>
            </form>
        </div>
    </div>
</body>
</html>
